# ── Raw input files ─────────────────────────────────────────────────────────
# Point these to your raw data files.
# For Yost 2019 BCC demo: use the GEO downloads in data/raw_downloads/
# For your own patient data: replace with CellRanger outputs etc.
raw_counts_path:   "data/raw_downloads/GSE123813_bcc_scRNA_counts.txt.gz"
raw_metadata_path: "data/raw_downloads/GSE123813_bcc_tcell_metadata.txt.gz"
raw_tcr_path:      "data/raw_downloads/GSE123813_bcc_tcr.txt.gz"
caushi_cd8_gz:     "data/raw_downloads/GSE176021_CD8_annotations.rds.gz"

# ── Derived files (generated by NB00, consumed by NB01–NB05) ─────────────────
# CCA pipeline outputs — scVI pipeline reads from data/scvi/ directly
reference_path:               "data/cca/reference.rds"
query_path:                   "data/cca/query.rds"
tcr_path:                     "data/cca/yost2019_bcc_tcr.rds"
caushi_clonotypes_path:       "data/caushi2021_ranked_clonotypes.csv"

# ── QC thresholds ─────────────────────────────────────────────────────────────
min_genes: 200
max_genes: 4000
max_pct_mito: 25

# ── Analysis parameters ───────────────────────────────────────────────────────
min_cells_per_clonotype: 2
n_exhausted_clonotypes: 20
reference_split_fraction: 0.7   # fraction of cells used as reference (NB00)
n_dims: 30                       # PCA dims for CCA / UMAP

# ── Patient-based LOO split ───────────────────────────────────────────────────
# Set to a patient ID to hold out that patient as query; rest become reference.
# Used for output file naming — must be non-empty for deterministic naming.
query_patient: "su009"
